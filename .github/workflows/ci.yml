name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Node.js 22
        uses: actions/setup-node@v6.5.0
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Validate
        run: npm run check
